<!DOCTYPE html>
<html lang="en">
<head>
<style>

    .contact-container { padding: 50px 5%; }
.contact-box { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 40px; 
    background: #f9f9f9; 
    padding: 30px; 
    border-radius: 15px; 
}

.contact-form input, .contact-form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.contact-info p { margin: 15px 0; font-size: 1.1rem; }
</style>

    <link rel="stylesheet" href="manpasand footwear.css">
    <title>Contact Us | Manpasand Footwear</title>
</head>
<body>

    <header class="minimal-header">
        <img src="manpasand.png" alt="Logo" class="logo">
        <nav>
            <a href="main index.html">Home</a>
            <a href="manpasand footwear collection.html">Collection</a>
            <a href="manpasand footwear contact.html">Contact</a>
        </nav>
    </header>

    <main class="contact-container">
        <h1>Get In Touch</h1>
        
        <div class="contact-box">
            <div class="contact-info">
                <h3>Contact Details</h3>
                <p><i class="fas fa-map-marker-alt"></i> Shop No. 12, Main Market, City</p>
                <p><i class="fas fa-phone"></i> +91 98765 43210</p>
                <p><i class="fas fa-envelope"></i> support@manpasand.com</p>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Message" rows="5"></textarea>
                <button type="submit" class="buy-btn">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
