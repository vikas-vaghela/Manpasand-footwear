<!DOCTYPE html>
<html lang="en">
<head>


   <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Contact Us | Manpasand Footwear</title>
</head>
<body>

    <header class="header1">
        <img src="manpasand.png" alt="Logo" class="logo">
        <nav class="header2">
            <a href="main index.html">Home</a>
            <a href="manpasand footwear collection.html">Collection</a>
            <a href="manpasand footwear contact.html">Contact</a>
        </nav>
    </header>

    <main class="contact-container">
        <h1>Contact Us</h1>
        
        <div class="contact-box">
            <div class="contact-info">
                <h3>Contact Details</h3>
                <p><i class="fas fa-map-marker-alt"></i> Shop No. 12, Main Market, City</p>
                <p><i class="fas fa-phone"></i> +91 98765 43210</p>
                <p><i class="fas fa-envelope"></i> support@manpasand.com</p>
            </div>

            <form class="contact-form" onsubmit="sendWhatsApp(event)">
    <input type="text" id="name" placeholder="Your Name" required>

    <input type="email" id="email" placeholder="Your Email" required>

    <textarea id="message" placeholder="Message" rows="5"></textarea>

    <button type="submit" class="buy-btn">Send Message</button>
</form>
        </div>
    </main>

    <script>
function sendWhatsApp(event){
    event.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    let whatsappNumber = "917096254826";

    let text =
`📩 New Contact Message

👤 Name: ${name}

📧 Email: ${email}

💬 Message:
${message}`;

    let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(text);

    window.open(url, "_blank");
}
</script>
</body>
</html>
