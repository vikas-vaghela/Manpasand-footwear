<!DOCTYPE html>
<html lang="en">
<head>
    <style>


/* Card aur Info styling */
.product-card {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.product-title { margin: 10px 0; color: #2c3e50; font-size: 1.2rem; }

.product-info { 
    margin: 5px 0; 
    font-size: 0.9rem; 
    color: #555; 
}

.product-info strong { color: #27ae60; }

.buy-btn {
    background: #27ae60;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    margin-top: 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}


collection-banner {
    padding: 20px 5%;
    margin-bottom: 20px;
}

.collection-products {
    padding: 20px 5%;
}

/* Image ko responsive banane ke liye */
img {
    max-width: 100%;
    height: auto;
    display: block;
}


.header1 {
    /* Header ko top par pin karne ke liye */
    position: sticky; 
    top: 0;
    
    /* Ye zaroori hai taaki header content ke upar dikhe */
    z-index: 1000; 
    
    /* Styling */
    width: 100%;
    background-color: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Halka shadow taaki header alag dikhe */
}

    </style>
    <link rel="stylesheet" href="manpasand footwear.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Manpasand Footwear | Premium Collection</title>
</head>
<body>

    <header class="header1">
        <img src="manpasand.png" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="main index.html">Home</a></li>
                <li><a href="manpasand footwear collection.html">Collection</a></li>
                <li><a href="manpasand footwear contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" placeholder="Search shoes..." id="search-input">
            <button type="submit"><i class="fas fa-search"></i></button>
        </div>
    </header>

  <section class="collection-banner">
    <img src="manpasand footwear banner.jpg" alt="Collection Banner" style="width: 100%; border-radius: 15px;">
</section>


    <div class="category-filter">
        <button onclick="filterCategory('all')"><i class="fas fa-th-large"></i> All</button>
        <button onclick="filterCategory('men')"><i class="fas fa-male"></i> Men</button>
        <button onclick="filterCategory('women')"><i class="fas fa-female"></i> Women</button>
    </div>

    <main class="product-container" id="product-list">
        <div class="product-card" data-category="men">
            <img src="client22.jpg" alt="Sport Shoes">
            <h3 class="product-title">Sport Pro Runner</h3>
            <p class="product-info">Quality: <strong>Premium Mesh</strong></p>
            <p class="product-info">Sizes: <strong>6, 7, 8, 9</strong></p>
            <p class="product-info">Price: <strong>₹999</strong></p>
            <button class="buy-btn">Buy Now</button>
        </div>
        
        <div class="product-card" data-category="women">
            <img src="client2.jpg" alt="Formal Shoes">
            <h3 class="product-title">Elegant Formal</h3>
            <p class="product-info">Quality: <strong>Genuine Leather</strong></p>
            <p class="product-info">Sizes: <strong>5, 6, 7, 8</strong></p>
            <p class="product-info">Price: <strong>₹1299</strong></p>
            <button class="buy-btn">Buy Now</button>
        </div>
    </main>

    <script>
        function filterCategory(category) {
            const products = document.getElementsByClassName('product-card');
            for (let card of products) {
                card.style.display = (category === 'all' || card.getAttribute('data-category') === category) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
