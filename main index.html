<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="manpasand footwear.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Manpasand Footwear</title>
</head>
<body>

    <header>
        <img src="manpasand.png" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Collection</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" placeholder="Search for Shoes..." id="search-input">
            <button type="submit">Search</button>
        </div>
    </header>

    <section class="banner">
        <h1>Welcome to Manpasand Footwear</h1>
        <p>Best quality footwear at best prices!</p>
    </section>

    <div class="category-filter">
        <button onclick="filterCategory('all')"><i class="fas fa-th-large"></i> All</button>
        <button onclick="filterCategory('men')"><i class="fas fa-male"></i> Men</button>
        <button onclick="filterCategory('women')"><i class="fas fa-female"></i> Women</button>
    </div>

    <main class="product-container" id="product-list">
        <div class="product-card" data-category="men">
            <img src="client22.jpg" alt="Sport Shoes">
            <h3 class="product-title">Sport Shoes</h3>
            <p class="product-info">Price: <strong>₹999</strong></p>
            <button class="buy-btn">Buy Now</button>
        </div>
        <div class="product-card" data-category="women">
            <img src="client2.jpg" alt="Formal shoes">
            <h3 class="product-title">Formal shoes</h3>
            <p class="product-info">Price: <strong>₹999</strong></p>
            <button class="buy-btn">Buy Now</button>
        </div>
        <div class="product-card" data-category="men">
            <img src="client2,3.jpg" alt="Stylish chapple">
            <h3 class="product-title">Stylish chapple</h3>
            <p class="product-info">Price: <strong>₹999</strong></p>
            <button class="buy-btn">Buy Now</button>
        </div>
    </main>

    <script>
        function filterCategory(category) {
            const products = document.getElementsByClassName('product-card');
            for (let i = 0; i < products.length; i++) {
                if (category === 'all' || products[i].getAttribute('data-category') === category) {
                    products[i].style.display = "";
                } else {
                    products[i].style.display = "none";
                }
            }
        }
        const searchInput = document.getElementById('search-input');
        const products = document.getElementsByClassName('product-card');
        searchInput.addEventListener('keyup', function() {
            const filter = searchInput.value.toLowerCase();
            for (let i = 0; i < products.length; i++) {
                let title = products[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
                products[i].style.display = title.indexOf(filter) > -1 ? "" : "none";
            }
        });
    </script>
</body>
</html>
