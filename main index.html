<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="manpasand footwear.css">
    <title>Manpasand Footwear</title>
</head>
<body>

    <header>
        <img src="manpasand footwear logo..jpg" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Collection</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="search-container">
            <input type="text" placeholder="Search for Shoes..." id="search-input">
            <button type="submit">Search</button>
        </div>
    </header>

    <section class="banner">
        <h1>Welcome to manpasand footwear</h1>
        <p>Best quality footwear at best prices!</p>
    </section>

    <main class="product-container" id="product-list">

        <div class="product-card">
            <img src="client22.jpg" alt="Sport Shoes">
            <h3 class="product-title">Sport Shoes</h3>
            <p class="product-info">Price: <strong>₹999</strong></p>
            <p class="product-info">Size: <strong>6,7, 8, 9, 10</strong></p>
            <div class="qty-section">
                Qty: <input type="number" value="1" min="1">
            </div>
            <button class="buy-btn">Buy Now</button>
        </div>

        </main>

    <footer>
        <p>&copy; 2026 Manpasand Footwear. All Rights Reserved.</p>
    </footer>

    <script>
        const searchInput = document.getElementById('search-input');
        const productList = document.getElementById('product-list'); // Ye ab sahi kaam karega
        const products = productList.getElementsByClassName('product-card');

        searchInput.addEventListener('keyup', function() {
            const filter = searchInput.value.toLowerCase();
            for (let i = 0; i < products.length; i++) {
                // Ye h3 dhoond raha hai
                let title = products[i].getElementsByTagName("h3")[0];
                if (title.innerHTML.toLowerCase().indexOf(filter) > -1) {
                    products[i].style.display = "";
                } else {
                    products[i].style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
